<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Category Page</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
      }

      .sidebar {
        width: 200px;
        height: 100vh;
        background: #1e293b;
        color: white;
        position: fixed;
        padding: 20px;
      }

      .sidebar h2 {
        margin-bottom: 20px;
      }

      .sidebar a {
        display: block;
        color: white;
        padding: 10px;
        text-decoration: none;
        border-radius: 5px;
      }

      .sidebar a:hover {
        background: #334155;
      }

      .main {
        margin-left: 220px;
        padding: 20px;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .btn {
        background: #2563eb;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;
        padding: 20px;
        width: 400px;
        border-radius: 10px;
      }

      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      img {
        width: 100px;

        margin-top: 10px;
      }

      .table {
        margin-left: 250px;
        width: 80%;
        margin-top: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }

      thead {
        background: #2563eb;
        color: white;
      }

      th {
        padding: 12px;
        text-align: left;
        font-size: 14px;
      }

      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }

      td img {
        width: 80px;
        height: 60px;
        object-fit: cover;
        border-radius: 5px;
      }

      /* Buttons */
      .edit-btn {
        background: #22c55e;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .delete-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 6px 10px;
        border-radius: 5px;
        cursor: pointer;
      }

      .edit-btn:hover {
        background: #16a34a;
      }

      .delete-btn:hover {
        background: #dc2626;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Admin</h2>
      <a href="#">Dashboard</a>
      <a href="#" onclick="openModal()">Categories</a>
    </div>

    <div class="main">
      <div class="card">
        <h2>Categories Page</h2>
        <button class="btn" onclick="openModal()">+ Add Category</button>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Add Category</h3>

        <input type="file" id="imageInput" />
        <img id="preview" />

        <input type="text" placeholder="Category Name" id="Categoryname" />
        <input type="text" placeholder="Slug" id="slug" />
        <textarea placeholder="Description" id="Description"></textarea>

        <button class="btn" id="saveBtn" onclick="closeModal()">Save</button>
      </div>
    </div>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Img</th>
            <th>Categoryname</th>
            <th>Slug</th>
            <th>Description</th>
            <th>edit</th>
            <th>delete</th>
          </tr>
        </thead>
        <tbody id="showdata"></tbody>
      </table>
    </div>
    <script>
      const modal = document.getElementById("modal");
      const input = document.getElementById("imageInput");
      const preview = document.getElementById("preview");
      let liveapi = "https://categoryapi-oluc.onrender.com/api/category";
      let editId = null;

      function openModal() {
        modal.style.display = "flex";
      }
      function resetfrom() {
        document.getElementById("Categoryname").value = "";
        document.getElementById("slug").value = "";
        document.getElementById("Description").value = "";
        document.getElementById("preview").style.display = "none";
        document.getElementById("saveBtn").innerText = "Save";
        editId = null;
      }

      async function closeModal() {
        const input = document.getElementById("imageInput");
        const Categoryname = document.getElementById("Categoryname").value;
        const slug = document.getElementById("slug").value;
        const Description = document.getElementById("Description").value;

        const formData = new FormData();

        if (input.files[0]) {
          formData.append("Img", input.files[0]);
        } // 🔥 file
        formData.append("Categoryname", Categoryname);
        formData.append("Slug", slug);
        formData.append("Description", Description);

        console.log("hyy");
        try {
          let url = `${liveapi}`;
          let method = "POST";

          // 🔥 EDIT MODE
          if (editId) {
            url += "/" + editId;
            method = "PATCH";
          }

          const res = await fetch(url, {
            method: method,
            body: formData,
          });
          const data = await res.json();
          console.log(data);
          if (res.ok) {
            dbdata();
            modal.style.display = "none";
            resetfrom();
          }
        } catch (error) {
          console.error(error);
        }
      }
      window.onload = dbdata;
      //get data

      async function dbdata() {
        const showdata = document.getElementById("showdata");
        const res = await fetch(`${liveapi}`);
        const data = await res.json();
        showdata.innerHTML = " ";
        console.log(data);
        const realData = data.data;
        realData.forEach((item) => {
          console.log(item);
          showdata.innerHTML += `
            <tr>
    <td><img src="${item.Img}"  width="50px" height="50px" alt="img"/></td>
    <td>${item.Categoryname}</td>
    <td>${item.Slug}</td>
    <td>${item.Description}</td>
    <td><button class="edit-btn"   onclick="updateCategory('${item._id}')">Edit</button></td>
    <td> <button class="delete-btn" onclick="deleteCategory('${item._id}')">
    Delete
  </button></td>
  </tr>
        `;
        });
      }

      //delete
      async function deleteCategory(_id) {
        try {
          console.log(_id);
          const res = await fetch(`${liveapi}/${_id}`, {
            method: "delete",
          });

          const data = await res.json();
          if (res.ok) {
            alert("Deleted successfully ✅");
            location.reload(); // page refresh
          } else {
            alert(data.message);
          }
        } catch (error) {
          console.log("DELETE ERROR:", error);
        }
      }
      //update
      async function updateCategory(_id) {
        try {
          // 🔥 button change

          editId = _id;

          const res = await fetch(`${liveapi}/${_id}`);
          const data = await res.json();

          const item = data.data; // backend se ek hi object aana chahiye

          // 🔥 form fill
          document.getElementById("Categoryname").value = item.Categoryname;
          document.getElementById("slug").value = item.Slug;
          document.getElementById("Description").value = item.Description;

          // 🔥 image preview
          if (item.Img) {
            preview.src = item.Img;
            preview.style.display = "block";
          }

          // 🔥 button change
          document.getElementById("saveBtn").innerText = "Update";

          openModal();
        } catch (error) {
          console.log("Edit error:", error);
        }
      }
      // Image preview
      input.addEventListener("change", () => {
        const file = input.files[0];
        if (file) {
          preview.src = URL.createObjectURL(file);
          preview.style.display = "block";
        }
      });
    </script>
  </body>
</html>
