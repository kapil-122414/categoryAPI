<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Category Dashboard</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #f4f6f9;
      }

      /* Sidebar */
      .sidebar {
        width: 220px;
        height: 100vh;
        background: #1e293b;
        color: white;
        position: fixed;
        padding: 20px;
      }
      .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
      }
      .sidebar a:hover {
        background: #334155;
      }

      /* Main */
      .main {
        margin-left: 240px;
        padding: 20px;
      }

      /* Top */
      .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
      }

      .search {
        width: 60%;
        padding: 10px;
      }

      /* Cards */
      .cards {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .card {
        flex: 1;
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      }

      /* Table */
      table {
        width: 100%;
        background: white;
        border-radius: 10px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px;
      }
      thead {
        background: #2563eb;
        color: white;
      }

      img {
        width: 50px;
        height: 50px;
        border-radius: 5px;
      }

      /* Badge */
      .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
      }
      .active {
        background: #22c55e;
        color: white;
      }
      .inactive {
        background: #ef4444;
        color: white;
      }

      /* Buttons */
      .btn {
        background: #2563eb;
        color: white;
        padding: 8px;
        border: none;
        border-radius: 5px;
      }

      .edit-btn {
        background: green;
        color: white;
      }
      .delete-btn {
        background: red;
        color: white;
      }

      /* Modal */
      .modal {
        display: none;
        position: fixed;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: white;
        padding: 20px;
        width: 400px;
        border-radius: 10px;
      }

      #preview {
        width: 80px;
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Admin Panel</h2>
      <a href="#">Dashboard</a>
      <a href="#">Categories</a>
    </div>

    <div class="main">
      <div class="top-bar">
        <input
          type="text"
          placeholder="Search..."
          class="search"
          onkeyup="searchData(this.value)"
        />
        <button class="btn" onclick="openModal()">+ Add Category</button>
      </div>

      <!-- Cards -->
      <div class="cards">
        <div class="card">Total<br /><b id="total"></b></div>
        <div class="card">Active<br /><b id="active"></b></div>
        <div class="card">Featured<br /><b id="featured"></b></div>
      </div>

      <!-- Table -->
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="data"></tbody>
      </table>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Add Category</h3>

        <input type="file" id="imageInput" />
        <img id="preview" />

        <input type="text" id="name" placeholder="Category Name" />
        <input type="text" id="slug" placeholder="Slug" />
        <textarea id="desc" placeholder="Description"></textarea>

        <select id="status">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>

        <label> <input type="checkbox" id="featuredCheck" /> Featured </label>

        <button class="btn" onclick="save()">Save</button>
      </div>
    </div>

    <script>
      let api = "https://categoryapi-oluc.onrender.com/api/category";
      let editId = null;
      let allData = [];

      function openModal() {
        modal.style.display = "flex";
      }

      function closeModal() {
        modal.style.display = "none";
      }

      async function load() {
        let res = await fetch(api);
        let json = await res.json();
        allData = json.data;
        render(allData);
      }

      function render(arr) {
        document.getElementById("total").innerText = arr.length;

        let active = arr.filter((x) => x.status === "active").length;
        let featured = arr.filter((x) => x.featured).length;

        document.getElementById("active").innerText = active;
        document.getElementById("featured").innerText = featured;

        let html = "";

        arr.forEach((item) => {
          html += `
    <tr>
    <td>
      <img src="${item.Img}">
      ${item.Categoryname}
    </td>
    <td>${item.Description}</td>
    <td><span class="badge ${item.status}">${item.status}</span></td>
    <td>
      <button class="edit-btn" onclick="edit('${item._id}')">Edit</button>
      <button class="delete-btn" onclick="del('${item._id}')">Delete</button>
    </td>
    </tr>
    `;
        });

        data.innerHTML = html;
      }

      /* Search */
      function searchData(val) {
        let filtered = allData.filter((x) =>
          x.Categoryname.toLowerCase().includes(val.toLowerCase()),
        );
        render(filtered);
      }

      /* Save */
      async function save() {
        let fd = new FormData();

        if (imageInput.files[0]) {
          fd.append("Img", imageInput.files[0]);
        }

        fd.append("Categoryname", name.value);
        fd.append("Slug", slug.value);
        fd.append("Description", desc.value);
        fd.append("status", status.value);
        fd.append("featured", featuredCheck.checked);

        let url = api;
        let method = "POST";

        if (editId) {
          url += "/" + editId;
          method = "PATCH";
        }

        await fetch(url, { method, body: fd });
        closeModal();
        load();
      }

      /* Edit */
      async function edit(id) {
        editId = id;
        let res = await fetch(api + "/" + id);
        let d = await res.json();
        let item = d.data;

        name.value = item.Categoryname;
        slug.value = item.Slug;
        desc.value = item.Description;
        status.value = item.status || "active";
        featuredCheck.checked = item.featured || false;

        if (item.Img) {
          preview.src = item.Img;
          preview.style.display = "block";
        }

        openModal();
      }

      /* Delete */
      async function del(id) {
        await fetch(api + "/" + id, { method: "DELETE" });
        load();
      }

      imageInput.onchange = () => {
        preview.src = URL.createObjectURL(imageInput.files[0]);
        preview.style.display = "block";
      };

      window.onclick = (e) => {
        if (e.target == modal) closeModal();
      };

      window.onload = load;
    </script>
  </body>
</html>
