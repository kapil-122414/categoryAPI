<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="sidebar">
      <h2>Admin</h2>
      <a href="#">Dashboard</a>
      <a href="#" onclick="openModal()">Categories</a>
    </div>

    <div class="main">
      <div class="card">
        <h2>Categories Page</h2>
        <button class="btn" onclick="openModal()">+ Add Category</button>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Add Category</h3>

        <input type="file" id="imageInput" />
        <img id="preview" />

        <input type="text" placeholder="Category Name" id="Categoryname" />
        <input type="text" placeholder="Slug" id="slug" />
        <textarea placeholder="Description" id="Description"></textarea>

        <button class="btn" id="saveBtn" onclick="closeModal()">Save</button>
      </div>
    </div>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Img</th>
            <th>Categoryname</th>
            <th>Slug</th>
            <th>Description</th>
            <th>edit</th>
            <th>delete</th>
          </tr>
        </thead>
        <tbody id="showdata"></tbody>
      </table>
      <div id="pagination" style="margin-left: 250px; margin-top: 20px"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
