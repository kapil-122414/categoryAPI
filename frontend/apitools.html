<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Category Page</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f9;
        margin: 0;
      }
      .sidebar {
        width: 200px;
        height: 100vh;
        background: #1e293b;
        color: #fff;
        position: fixed;
        padding: 20px;
      }
      .sidebar a {
        display: block;
        color: #fff;
        padding: 10px;
        text-decoration: none;
      }
      .main {
        margin-left: 220px;
        padding: 20px;
      }
      .card {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
      }
      .btn {
        background: #2563eb;
        color: #fff;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
      }
      .modal-content {
        background: #fff;
        padding: 20px;
        width: 400px;
        border-radius: 10px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin: 5px 0 10px;
      }
      .table {
        margin-left: 250px;
        width: 80%;
      }
      table {
        width: 100%;
        background: #fff;
        border-collapse: collapse;
      }
      thead {
        background: #2563eb;
        color: #fff;
      }
      td,
      th {
        padding: 10px;
      }
      td img {
        width: 80px;
        height: 60px;
        object-fit: cover;
      }
      .edit-btn {
        background: #22c55e;
        color: #fff;
        border: none;
        padding: 5px;
      }
      .delete-btn {
        background: #ef4444;
        color: #fff;
        border: none;
        padding: 5px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>Admin</h2>
      <a href="#">Dashboard</a>
      <a href="#" onclick="openModal()">Categories</a>
    </div>

    <div class="main">
      <div class="card">
        <h2>Categories Page</h2>
        <button class="btn" onclick="openModal()">+ Add Category</button>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Add Category</h3>

        <input type="file" id="imageInput" />
        <img id="preview" style="display: none" />

        <input type="text" id="Categoryname" placeholder="Category Name" />
        <input type="text" id="slug" placeholder="Slug" />
        <textarea id="Description" placeholder="Description"></textarea>

        <button class="btn" id="saveBtn" onclick="saveCategory()">Save</button>
      </div>
    </div>

    <div class="table">
      <table>
        <thead>
          <tr>
            <th>Img</th>
            <th>Name</th>
            <th>Slug</th>
            <th>Description</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="showdata"></tbody>
      </table>
    </div>

    <script>
      const modal = document.getElementById("modal");
      const preview = document.getElementById("preview");
      let editId = null;

      // open modal
      function openModal() {
        modal.style.display = "flex";
        resetForm();
      }

      // reset form
      function resetForm() {
        document.getElementById("Categoryname").value = "";
        document.getElementById("slug").value = "";
        document.getElementById("Description").value = "";
        document.getElementById("imageInput").value = "";
        preview.style.display = "none";
        document.getElementById("saveBtn").innerText = "Save";
        document.getElementById("modalTitle").innerText = "Add Category";
        editId = null;
      }

      // SAVE (POST + PATCH)
      async function saveCategory() {
        const input = document.getElementById("imageInput");
        const formData = new FormData();

        formData.append(
          "Categoryname",
          document.getElementById("Categoryname").value,
        );
        formData.append("Slug", document.getElementById("slug").value);
        formData.append(
          "Description",
          document.getElementById("Description").value,
        );

        if (input.files[0]) {
          formData.append("Img", input.files[0]);
        }

        let url = "http://localhost:5000/api/category/";
        let method = "POST";

        if (editId) {
          url += editId;
          method = "PATCH";
        }

        const res = await fetch(url, { method, body: formData });

        if (res.ok) {
          alert(editId ? "Updated ✅" : "Added ✅");
          modal.style.display = "none";
          dbdata();
        }
      }

      // GET ALL
      async function dbdata() {
        const res = await fetch("http://localhost:5000/api/category");
        const data = await res.json();

        const showdata = document.getElementById("showdata");
        showdata.innerHTML = "";

        data.data.forEach((item) => {
          showdata.innerHTML += `
      <tr>
        <td><img src="http://localhost:5000/${item.Img}"></td>
        <td>${item.Categoryname}</td>
        <td>${item.Slug}</td>
        <td>${item.Description}</td>
        <td><button class="edit-btn" onclick="editCategory('${item._id}')">Edit</button></td>
        <td><button class="delete-btn" onclick="deleteCategory('${item._id}')">Delete</button></td>
      </tr>`;
        });
      }

      // DELETE
      async function deleteCategory(id) {
        const res = await fetch(`http://localhost:5000/api/category/${id}`, {
          method: "DELETE",
        });

        if (res.ok) {
          alert("Deleted ✅");
          dbdata();
        }
      }

      // EDIT (GET BY ID)
      //   async function editCategory(id) {
      //   modal.style.display = "flex";
      //   editId = id;

      //   document.getElementById("saveBtn").innerText = "Update";
      //   document.getElementById("modalTitle").innerText = "Update Category";

      //   const res = await fetch(`http://localhost:5000/api/category/${id}`);
      //   const data = await res.json();
      //   const item = data.data;

      //   document.getElementById("Categoryname").value = item.Categoryname;
      //   document.getElementById("slug").value = item.Slug;
      //   document.getElementById("Description").value = item.Description;

      //   preview.src = `http://localhost:5000/${item.Img}`;
      //   preview.style.display = "block";

      //   document.getElementById("imageInput").value = "";
      // }
      async function editCategory(id) {
        try {
          console.log("Edit clicked 👉", id);

          editId = id;

          const res = await fetch(`http://localhost:5000/api/category/${id}`);

          if (!res.ok) {
            alert("API error");
            return;
          }

          const data = await res.json();
          console.log("API DATA 👉", data);

          const item = data.data || data;

          // fill form
          document.getElementById("Categoryname").value =
            item.Categoryname || "";
          document.getElementById("slug").value = item.Slug || "";
          document.getElementById("Description").value = item.Description || "";

          // image preview
          if (item.Img) {
            preview.src = `http://localhost:5000/${item.Img}`;
            preview.style.display = "block";
          } else {
            preview.style.display = "none";
          }

          document.getElementById("imageInput").value = "";

          // update UI
          document.getElementById("saveBtn").innerText = "Update";
          document.getElementById("modalTitle").innerText = "Update Category";

          // open modal LAST
          modal.style.display = "flex";
        } catch (error) {
          console.log("Edit error:", error);
        }
      } // preview image
      document.getElementById("imageInput").addEventListener("change", (e) => {
        if (e.target.files[0]) {
          preview.src = URL.createObjectURL(e.target.files[0]);
          preview.style.display = "block";
        }
      });

      window.onload = dbdata;
    </script>
  </body>
</html>
